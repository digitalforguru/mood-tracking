<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mood Tracker Widget</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- BUILDER UI -->
<div class="builder-ui">

  <div class="widget-header">
    Mood Tracker Widget
  </div>

  <!-- USAGE TIP (MISSING BEFORE) -->
  <div id="usageTip" class="usage-tip">
    welcome to your mood tracker ✧<br>
    click each day to log your mood<br>
    customize theme + font + copy embed link for notion
  </div>

  <!-- THEME OPTIONS -->
  <div id="themeOptions" class="theme-options hidden">
    <div class="theme-circle pink" data-theme="pink"></div>
    <div class="theme-circle green" data-theme="green"></div>
    <div class="theme-circle beige" data-theme="beige"></div>
    <div class="theme-circle blue" data-theme="blue"></div>
  </div>

  <!-- FONT OPTIONS -->
  <div id="fontOptions" class="theme-options hidden">
    <div class="font-option" data-font="default">default</div>
    <div class="font-option" data-font="serif">serif</div>
    <div class="font-option" data-font="mono">mono</div>
  </div>

  <!-- CONTROLS -->
  <div class="top-left-controls">

    <div id="themeToggle" class="btn">🎨</div>
    <div id="fontToggle" class="btn">Aa</div>

  </div>

  <!-- COPY BUTTON -->
  <div class="setup-area">
    <button id="copyLinkBtn" class="copy-btn">
      copy my embed Notion link .ᐟ.ᐟ
    </button>

    <p id="copyMessage" class="copy-message hidden">
      copied! paste into notion .ᐟ.ᐟ
    </p>
  </div>

</div>

<!-- WIDGET -->
<div class="widget pink" id="widget-box">

  <div class="grid" id="mood-grid"></div>

  <button id="reset-button" class="reset-btn">reset</button>
  <button id="view-log-btn" class="reset-btn">view log</button>

  <!-- RESET POPUP -->
  <div id="reset-popup" class="reset-popup hidden">
    <p>reset all moods?</p>
    <div class="reset-actions">
      <button id="confirm-reset">yes</button>
      <button id="cancel-reset">no</button>
    </div>
  </div>

  
<div id="mood-log-popup" class="reset-popup hidden">

  <h3>mood year</h3>

  <div id="log-entries" class="year-grid"></div>

  <button id="close-log-btn">close</button>

</div>

</div>

<script src="mood-tracker.js"></script>
</body>
</html>
